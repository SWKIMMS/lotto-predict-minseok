<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 통계 조합기</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <div class="mast">
          <div>
            <p class="eyebrow">Lotto 6/45</p>
            <h1 id="page-title">로또 통계 조합기</h1>
          </div>
          <div class="source-badge">
            <span id="latest-draw">-</span>
            <small id="latest-date">-</small>
          </div>
        </div>

        <div class="layout">
          <aside class="control-panel" aria-label="추천 설정">
            <div class="panel-block">
              <span class="label">전략</span>
              <div class="segment" role="group" aria-label="전략 선택">
                <button class="segment-button active" type="button" data-mode="balanced">균형형</button>
                <button class="segment-button" type="button" data-mode="frequency">빈도형</button>
                <button class="segment-button" type="button" data-mode="overdue">미출현형</button>
              </div>
            </div>

            <div class="panel-block two-column">
              <label class="field">
                <span class="label">추천 수</span>
                <input id="set-count" type="number" min="1" max="10" value="5" />
              </label>
              <label class="field">
                <span class="label">후보 강도</span>
                <input id="sample-size" type="number" min="600" max="6000" step="200" value="2600" />
              </label>
            </div>

            <div class="panel-block toggles">
              <label class="toggle">
                <input id="allow-consecutive" type="checkbox" checked />
                <span>연속번호 허용</span>
              </label>
              <label class="toggle">
                <input id="include-bonus" type="checkbox" />
                <span>보너스번호 반영</span>
              </label>
            </div>

            <button id="generate" class="primary-action" type="button">조합 다시 만들기</button>
            <p class="notice">당첨 보장 없음</p>
          </aside>

          <section class="results-area" aria-label="추천 조합">
            <div class="section-head">
              <div>
                <p class="eyebrow">Sets</p>
                <h2>추천 조합</h2>
              </div>
              <span id="strategy-note" class="pill">균형형</span>
            </div>
            <div id="recommendations" class="recommendations"></div>
          </section>
        </div>
      </section>

      <section class="stats-grid" aria-label="핵심 통계">
        <article class="stat-card">
          <span class="stat-label">분석 회차</span>
          <strong id="draw-count">-</strong>
          <small>누적 데이터</small>
        </article>
        <article class="stat-card">
          <span class="stat-label">평균 합계</span>
          <strong id="average-sum">-</strong>
          <small id="sum-band">-</small>
        </article>
        <article class="stat-card">
          <span class="stat-label">최다 출현</span>
          <strong id="top-number">-</strong>
          <small id="top-number-count">-</small>
        </article>
        <article class="stat-card">
          <span class="stat-label">최장 미출현</span>
          <strong id="cold-number">-</strong>
          <small id="cold-number-gap">-</small>
        </article>
      </section>

      <section class="insights" aria-label="상세 통계">
        <div class="insight-panel wide">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Map</p>
              <h2>번호별 출현</h2>
            </div>
          </div>
          <div id="frequency-chart" class="frequency-chart"></div>
        </div>

        <div class="insight-panel">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Hot</p>
              <h2>자주 나온 번호</h2>
            </div>
          </div>
          <div id="hot-list" class="number-list"></div>
        </div>

        <div class="insight-panel">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Cold</p>
              <h2>오래 안 나온 번호</h2>
            </div>
          </div>
          <div id="overdue-list" class="number-list"></div>
        </div>

        <div class="insight-panel wide">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Pairs</p>
              <h2>동반출현 상위 조합</h2>
            </div>
          </div>
          <div id="pair-list" class="pair-list"></div>
        </div>
      </section>
    </main>

    <script src="./data/lotto-history.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
