name: Update lotto data

on:
  workflow_dispatch:
  schedule:
    # Sunday 00:30 KST, after the Saturday Lotto 6/45 draw is published.
    - cron: "30 15 * * 6"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update draw history
        run: npm run update:data

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update lotto draw data"
          file_pattern: data/lotto-history.json data/lotto-history.js
